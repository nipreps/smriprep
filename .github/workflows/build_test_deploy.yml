name: Build-Test-Deploy

on:
  push:
    branches:
      - main
      - master
      - maint/*
    tags:
      - "*"
  pull_request:
    branches:
      - main
      - master
      - maint/*
  schedule:
    # 8am EST / 9am EDT Mondays
    - cron: "0 13 * * 1"
  workflow_dispatch:

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Force tox and pytest to use color
  FORCE_COLOR: true
  TEMPLATEFLOW_HOME: /tmp/templateflow

jobs:
  build:
    name: Build & verify package
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      # Pin to a specific v2 commit because floating @v2 can regress.
      # This commit currently carries tooling that is Python 3.14 compatible.
      # We also remove /tmp/baipp before each invocation as a temporary
      # compatibility guard for cached-venv reuse until upstream behavior is
      # stable across repeated invocations in one job.
      #
      # https://github.com/astral-sh/uv/issues/5450
      # or https://github.com/hynek/build-and-inspect-python-package/issues/155
      - name: Clean up baipp virtualenv path (main build)
        run: rm -rf /tmp/baipp
      - uses: hynek/build-and-inspect-python-package@c8508a8c721100cf0319cd57d297a5fcacc7cc40 # v2
        id: build-smriprep
        with:
          upload-name-suffix: -main
          attest-build-provenance-github: ${{ github.event_name != 'pull_request' }}
      - name: Clean up package build
        run: rm -r "$DIST"
        env:
          DIST: ${{ steps.build-smriprep.outputs.dist }}
      - name: Clean up baipp virtualenv path (wrapper build)
        run: rm -rf /tmp/baipp
      - uses: hynek/build-and-inspect-python-package@c8508a8c721100cf0319cd57d297a5fcacc7cc40 # v2
        id: build-wrapper
        with:
          path: wrapper
          upload-name-suffix: -wrapper
          attest-build-provenance-github: ${{ github.event_name != 'pull_request' }}
      - name: Clean up wrapper build
        run: rm -r "$DIST"
        env:
          DIST: ${{ steps.build-wrapper.outputs.dist }}

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["ubuntu-latest"]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        dependencies: [latest, pre]
        include:
          # Test minimum dependencies on oldest supported Python
          - os: ubuntu-latest
            python-version: "3.10"
            dependencies: min
        exclude:
          # Do not test pre-releases for versions out of SPEC0
          - os: ubuntu-latest
            python-version: "3.10"
            dependencies: pre

    env:
      DEPENDS: ${{ matrix.dependencies }}

    steps:
      - uses: actions/checkout@v6.0.1
        with:
          persist-credentials: false
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Display Python version
        run: python -c "import sys; print(sys.version)"

      - name: Restore cached templateflow
        id: tf-cache-restore
        uses: actions/cache@v5
        with:
          path: /tmp/templateflow
          key: templateflow-v0
          # Use the following to fall back to and build on v0 when bumping to v1
          # If the cache need to be cleared, remove this when bumping key version
          # restore-keys: |
          #   templateflow-v0
      - name: Initialize templateflow
        if: steps.tf-cache-restore.outputs.cache-hit != 'true'
        run: |
          uvx templateflow update --no-overwrite

      - name: Install tox
        run: |
          uv tool install tox --with=tox-uv --with=tox-gh-actions
      - name: Show tox config
        run: tox c
      - name: Run tox
        run: |
          if [[ "${DEPENDS}" != "pre" ]]; then
            tox -v --exit-and-dump-after 1800
            exit 0
          fi

          for attempt in 1 2 3; do
            echo "Running pre-release tox (attempt ${attempt}/3)"
            if tox -v --exit-and-dump-after 1800; then
              exit 0
            fi

            if [[ "${attempt}" -lt 3 ]]; then
              echo "Retrying after transient dependency-index failure..."
              sleep $((attempt * 30))
            fi
          done

          echo "Pre-release tox failed after 3 attempts."
          exit 1
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
        if: ${{ always() }}

  test-packages:
    runs-on: ${{ matrix.os }}
    needs: [build]
    strategy:
      matrix:
        os: ["ubuntu-latest"]
        python-version: ["3.12"]
        dependencies: ["latest"]

    env:
      DEPENDS: ${{ matrix.dependencies }}

    steps:
      - name: Download packages built by build-and-inspect-python-package
        uses: actions/download-artifact@v7
        with:
          pattern: Packages-*
          path: dist
      - run: ls -lR

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Restore cached templateflow
        id: tf-cache-restore
        uses: actions/cache@v5
        with:
          path: /tmp/templateflow
          key: templateflow-v0
          # Use the following to fall back to and build on v0 when bumping to v1
          # If the cache need to be cleared, remove this when bumping key version
          # restore-keys: |
          #   templateflow-v0
      - name: Check wrapper version
        run: |
          echo n | uvx --from=$( ls dist/*/smriprep_docker*.whl ) smriprep-docker --version

      - name: Unpack sdist
        run: |
          tar --strip-components=1 -xzf dist/*/smriprep-*.tar.gz

      - name: Install tox
        run: |
          uv tool install tox --with=tox-uv --with=tox-gh-actions
      - name: Show tox config
        run: tox c
      - name: Run tox
        run: tox -v --exit-and-dump-after 1800
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
        if: ${{ always() }}

  publish:
    name: Publish released package to pypi.org
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    environment: PyPI
    needs: [test, test-packages]
    permissions:
      attestations: write
      id-token: write

    steps:
      - name: Download packages built by build-and-inspect-python-package
        uses: actions/download-artifact@v7
        with:
          pattern: Packages-*
          path: dist

      - name: Upload package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/Packages-main/

      - name: Upload package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/Packages-wrapper/

  checks:
    runs-on: "ubuntu-latest"
    continue-on-error: true
    strategy:
      matrix:
        check: ["style", "spellcheck"]

    steps:
      - uses: actions/checkout@v6.0.1
        with:
          persist-credentials: false
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7
      - name: Install tox
        run: uv tool install tox --with=tox-uv
      - name: Show tox config
        run: tox c -e ${{ matrix.check }}
      - name: Run check
        run: tox -e ${{ matrix.check }}
